name: CI & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — runs on every push & PR
  # Lint + Build to catch errors before anything is published
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — runs ONLY when a GitHub Release is published
  # Uses OIDC (Trusted Publisher) — no npm token needed in secrets
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    environment: npm

    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to npm (OIDC)
        run: npm publish --access public --provenance